<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaccination Summary - VacciLink</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-logo">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            <span class="logo-text">VacciLink</span>
        </div>
        <nav class="nav-menu">
            <div class="nav-item"><a href="dashboard.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg><span class="nav-text">Dashboard</span></a></div>
            <div class="nav-item"><a href="timeline.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg><span class="nav-text">Vaccination Timeline</span></a></div>
            <div class="nav-item"><a href="appointment.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg><span class="nav-text">Appointments</span></a></div>
            <div class="nav-item"><a href="summary.html" class="nav-link active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg><span class="nav-text">Records (Summary)</span></a></div>
            <div class="nav-item"><a href="notifications.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg><span class="nav-text">Alerts</span></a></div>
            <div class="nav-item"><a href="profile.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span class="nav-text">Profile</span></a></div>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <h2>Overall Vaccination Summary</h2>
            <div class="user-actions">
                <button class="btn-primary" onclick="window.print()">Download PDF Report</button>
                <img src="../assets/images/parent-avatar.png" alt="User" class="profile-avatar">
            </div>
        </header>

        <section class="card">
            <h3>Immunization Record</h3>
            <p class="text-muted">A comprehensive table of all vaccines taken by Arya.</p>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Vaccine Name</th>
                            <th>Date Taken</th>
                            <th>Clinic / Hospital</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>

                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const email = localStorage.getItem("parentEmail");
        if (!email) window.location.href = "login.html";

        function formatDate(d) {
            if (!d) return "-";
            const date = new Date(d);
            const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
            return date.getDate().toString().padStart(2,"0") + " " + months[date.getMonth()] + " " + date.getFullYear();
        }

        fetch("/parent/" + email)
        .then(res => res.json())
        .then(parent => {
            if (!parent || !parent.childID) return;

            document.querySelector(".card p.text-muted").innerText =
                "A comprehensive table of all vaccines taken by " + (parent.childName || "child") + ".";

            // ✅ Use backend-merged data from /child/:childID
            fetch("/child/" + parent.childID)
            .then(res => res.json())
            .then(childData => {
                const vaccines = (childData && childData.vaccinationHistory) ? childData.vaccinationHistory : [];
                const tbody = document.querySelector(".table-container tbody");
                tbody.innerHTML = "";

                if (vaccines.length === 0) {
                    tbody.innerHTML = "<tr><td colspan='4' style='text-align:center;color:#888;'>No records found.</td></tr>";
                    return;
                }

                vaccines.forEach(v => {
                    const tr = document.createElement("tr");
                    let pillClass = "pill-upcoming";
                    let displayStatus = "Upcoming";
                    let pillStyle = "";

                    if (v.status === "completed") {
                        pillClass = "pill-completed";
                        displayStatus = "Completed";
                    } else if (v.status === "overdue") {
                        pillStyle = 'style="background:#ffebee;color:#d32f2f;"';
                        displayStatus = "Overdue";
                    } else if (v.status === "scheduled") {
                        pillStyle = 'style="background:#fff3e0;color:#f57c00;"';
                        displayStatus = "Scheduled";
                    }

                    // ✅ Date: show dateTaken for completed, scheduledDate for scheduled, dueDate otherwise
                    let dateDisplay = "-";
                    if (v.status === "completed" && v.dateTaken) {
                        dateDisplay = formatDate(v.dateTaken);
                    } else if (v.status === "scheduled" && v.scheduledDate) {
                        dateDisplay = formatDate(v.scheduledDate) + " (Appt)";
                    } else if (v.dueDate) {
                        dateDisplay = formatDate(v.dueDate);
                    }

                    let extraHTML = "";
                    if (v.status === "overdue") {
                        extraHTML = '<br><button class="btn-primary" style="margin-top:8px;padding:4px 8px;font-size:0.75rem;" onclick="window.location.href=\'appointment.html?vaccineName=' + encodeURIComponent(v.vaccineName) + '\'">Reschedule</button>';
                    } else if (v.status === "completed" && v.certificateId) {
                        extraHTML = '<br><button class="btn-primary" style="margin-top:8px;padding:4px 8px;font-size:0.75rem;background:white;color:#2e7d32;border:1px solid #2e7d32;" onclick="window.open(\'../verify.html?id=' + encodeURIComponent(v.certificateId) + '\', \'_blank\')">View Certificate</button>';
                    }

                    // ✅ Render v.hospital from backend-merged data
                    tr.innerHTML =
                        "<td>" + v.vaccineName + (v.doseNumber ? " (Dose " + v.doseNumber + ")" : "") + "</td>" +
                        "<td>" + dateDisplay + "</td>" +
                        "<td>" + (v.hospital || "-") + "</td>" +
                        "<td><span class=\"status-pill " + pillClass + "\" " + pillStyle + ">" + displayStatus + "</span>" + extraHTML + "</td>";

                    tbody.appendChild(tr);
                });
            });
        });
    </script>
</body>
</html>
