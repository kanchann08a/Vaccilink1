<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Records</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="vaccinator-theme">
    <nav class="nav-bar">
        <h2>🩺 VacciLink Admin</h2>
        <button class="btn btn-green" style="width:auto;" onclick="location.href='dashboard.html'">Back to Dashboard</button>
    </nav>

    <header class="main-header" style="margin-bottom: 20px;">
        <h1>Update Records</h1>
        <p>Log a completed vaccination dose.</p>
    </header>

    <main class="container">
        <!-- Form to log a vaccine dose -->
        <div class="card vaccinator-card">
            <div class="illustration">💉</div>
            <h2>Log Dose</h2>
            <form action="dashboard.html">
                <div class="form-group">
                    <label>Child ID / Name</label>
                    <input type="text" required placeholder="Baby Doe (#1234)">
                </div>
                <div class="form-group">
                    <label>Administered Vaccine</label>
                    <select required>
                        <option value="opv_2">OPV-2</option>
                        <option value="pentavalent_2">Pentavalent-2</option>
                        <option value="rotavirus_2">Rotavirus-2</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date Administered</label>
                    <input type="date" required id="adminDate">
                    <!-- Script to set today as default -->
                    <script>document.getElementById('adminDate').valueAsDate = new Date();</script>
                </div>
                <div class="form-group">
                    <label>Remarks / Notes</label>
                    <input type="text" placeholder="Healthy, no fever observed">
                </div>
                <button type="submit" class="btn btn-green">Update Record</button>
            </form>
        </div>
    </main>

    <script src="../js/script.js"></script>
</body>
</html>
