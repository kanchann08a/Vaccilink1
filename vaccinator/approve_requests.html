<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Approve Requests</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="vaccinator-theme">
    <nav class="nav-bar">
        <h2>🩺 VacciLink Admin</h2>
        <button class="btn btn-green" style="width:auto;" onclick="location.href='dashboard.html'">Back to Dashboard</button>
    </nav>

    <header class="main-header" style="margin-bottom: 20px;">
        <h1>Approve Requests</h1>
        <p>Manage pending appointments from parents.</p>
    </header>

    <main class="container">
        <!-- List of pending requests inside a card -->
        <div class="card vaccinator-card" style="width: 100%; max-width: 800px; text-align: left;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #c8e6c9; padding: 15px 0;">
                <div>
                    <h3>Child: Baby Doe</h3>
                    <p>Vaccine Ph: 10 Weeks (OPV-2)</p>
                    <p>Req. Date: 15-Mar-2023</p>
                </div>
                <div>
                    <button class="btn btn-green" style="width: auto; padding: 8px 16px; margin-right: 10px;">Approve</button>
                    <button class="btn" style="background-color: #f44336; color: white; width: auto; padding: 8px 16px;">Reject</button>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px 0;">
                <div>
                    <h3>Child: John Jr.</h3>
                    <p>Vaccine Ph: Birth Dose</p>
                    <p>Req. Date: 16-Mar-2023</p>
                </div>
                <div>
                    <button class="btn btn-green" style="width: auto; padding: 8px 16px; margin-right: 10px;">Approve</button>
                    <button class="btn" style="background-color: #f44336; color: white; width: auto; padding: 8px 16px;">Reject</button>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/script.js"></script>
</body>
</html>
