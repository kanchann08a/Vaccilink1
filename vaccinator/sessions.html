<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaccinator Session - VacciLink</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/vaccinator_dashboard.css">
    <style>
        .month-card {
            cursor: pointer;
            transition: transform 0.2s;
        }
        .month-card:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(46, 125, 50, 0.15);
        }
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background-color: #fff;
            margin: 5% auto;
            padding: 30px;
            border-radius: 15px;
            width: 70%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .close-modal {
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
        }
        .child-list-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .child-list-table th, .child-list-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e8f5e9;
        }
        .child-list-table th {
            background-color: var(--light-green);
            position: sticky;
            top: 0;
        }
    </style>
</head>
<body>

    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <svg viewBox="0 0 24 24" width="28" height="28" stroke="white" stroke-width="2.5" fill="none"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            <span>VacciLink</span>
        </div>

        <div class="vaccinator-profile">
            <div class="profile-img">SY</div>
            <div class="profile-info">
                <h4>Seema Yadav</h4>
                <p>Vaccinator</p>
            </div>
        </div>

        <nav class="nav-menu">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="sessions.html" class="nav-link active">Vaccinator Session</a>
            <a href="schedule.html" class="nav-link">Vaccination Schedule</a>
            <a href="fup.html" class="nav-link">Lost to Follow-Up</a>
            <a href="appointment.html" class="nav-link">Appointment</a>
            <a href="profile.html" class="nav-link">Profile</a>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <header class="welcome-header">
            <h1>Upcoming Vaccinations</h1>
            <p>View and manage upcoming vaccination sessions by month</p>
        </header>

        <div class="dashboard-grid" style="grid-template-columns: 1fr;">
            <div id="monthCardsGrid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px;">
                <!-- Dynamic Month Cards will be inserted here -->
                <div style="text-align:center; padding:50px; grid-column: 1/-1; color:var(--text-muted);">Loading monthly sessions...</div>
            </div>
        </div>
    </main>

    <!-- Modal for Children List -->
    <div id="childModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h3 id="modalTitle" style="color: var(--primary-green);">Upcoming Children</h3>
            <table class="child-list-table">
                <thead>
                    <tr>
                        <th>Child Name</th>
                        <th>ID</th>
                        <th>Vaccine</th>
                        <th>Dose</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="modalTableBody">
                    <!-- Data here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let monthlyData = [];

        async function fetchMonthlyData() {
            try {
                const res = await fetch('/vaccinator/monthly');
                monthlyData = await res.json();
                renderMonthCards(monthlyData);
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        function renderMonthCards(data) {
            const grid = document.getElementById('monthCardsGrid');
            grid.innerHTML = '';

            if (data.length === 0) {
                grid.innerHTML = '<div style="text-align:center; padding:50px; grid-column: 1/-1; color:var(--text-muted);">No upcoming vaccinations found</div>';
                return;
            }

            data.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card month-card';
                card.onclick = () => openModal(index);
                card.innerHTML = `
                    <h3 style="color: var(--primary-green);">${item.month}</h3>
                    <p style="margin-top: 10px; font-size: 1.1rem;">Upcoming Vaccinations: <strong>${item.count}</strong></p>
                    <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 5px;">(Click to view details)</p>
                `;
                grid.appendChild(card);
            });
        }

        function openModal(index) {
            const item = monthlyData[index];
            const modal = document.getElementById('childModal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalTableBody');

            title.innerText = `Upcoming Vaccinations in ${item.month}`;
            body.innerHTML = '';

            item.children.forEach(child => {
                const row = `<tr>
                    <td>${child.childName}</td>
                    <td>#${child.childID}</td>
                    <td>${child.vaccineName}</td>
                    <td>${child.doseNumber}</td>
                    <td>${child.date}</td>
                </tr>`;
                body.innerHTML += row;
            });

            modal.style.display = 'block';
        }

        function closeModal() {
            document.getElementById('childModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('childModal');
            if (event.target == modal) {
                closeModal();
            }
        }

        fetchMonthlyData();
    </script>
</body>
</html>
