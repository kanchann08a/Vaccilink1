<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - VacciLink</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/dashboard.css">
    <style>
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #edf2f7;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary-blue);
        }

        .slot-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .slot-btn {
            padding: 10px;
            border: 1px solid var(--primary-blue);
            border-radius: 8px;
            background: var(--white);
            color: var(--primary-blue);
            cursor: pointer;
            transition: all 0.3s;
        }

        .slot-btn.active {
            background: var(--primary-blue);
            color: var(--white);
        }
    </style>
</head>

<body>

            </svg>
            <span class="logo-text">VacciLink</span>
        </div>

                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg><span class="nav-text">Dashboard</span></a></div>
            <div class="nav-item"><a href="timeline.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg><span class="nav-text">Vaccination Timeline</span></a></div>

            <div class="nav-item"><a href="summary.html" class="nav-link"><svg viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">

    <main class="main-content">
        <header class="top-bar">
            <h2>Book Appointment</h2>
            <div class="user-actions">
                <img src="../assets/images/parent-avatar.png" alt="User" class="profile-avatar">
            </div>
        </header>

        <section class="card" style="max-width: 600px;">
            <div class="form-group">
                <label>Select Vaccine</label>
                <select class="form-control">
                    <option>MR-1 (Scheduled)</option>
                    <option>OPV-3</option>
                    <option>DPT Booster</option>
                </select>
            </div>

            <div class="form-group">
                <label>Select Date</label>
                <input type="date" class="form-control" value="2026-02-28">
            </div>

            <div class="form-group">
                <label>Select Clinic</label>
                <select class="form-control">
                    <option>XYZ Clinic - Mumbai</option>
                    <option>City Children's Hospital</option>
                    <option>Metro Health Center</option>
                </select>
            </div>

            <div class="form-group">
                <label>Available Time Slots</label>
                <div class="slot-grid">
                    <button class="slot-btn active">09:00 AM</button>
                    <button class="slot-btn">10:00 AM</button>
                    <button class="slot-btn">11:30 AM</button>
                    <button class="slot-btn">02:00 PM</button>
                    <button class="slot-btn">04:30 PM</button>
                </div>
            </div>

            <button class="btn-primary btn-full" onclick="bookAppointment()">Confirm Booking</button>
        </section>
    </main>

    <script src="../js/vaccineSchedule.js"></script>

    <script>

        const email = localStorage.getItem("parentEmail");

        if (!email) {
            window.location.href = "login.html";
        }

        let currentChildID = null;
        let childDOB = null;

        /* SLOT BUTTON LOGIC */

        const buttons = document.querySelectorAll('.slot-btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        /* FETCH PARENT */

        fetch("/parent/" + email)

            .then(res => res.json())

            .then(parent => {

                if (!parent) {
                    window.location.href = "login.html";
                    return;
                }

                currentChildID = parent.childID;
                childDOB = parent.childDOB;

                /* Load nearby clinics */

                const parentAddress = `${parent.address}, ${parent.city}`;
                fetchNearbyClinics(parentAddress);

                /* Fetch vaccination history */

                return fetch("/vaccination/" + parent.childID);

            })

            .then(res => res.json())

            .then(dbVaccines => {

                /* Generate full schedule */

                const schedule =
                    window.VacciLinkSchedule.generate(childDOB);

                /* Merge schedule + database */

                const merged =
                    window.VacciLinkSchedule.mergeWithHistory(schedule, dbVaccines);

                /* Vaccine dropdown */

                const select =
                    document.querySelectorAll("select.form-control")[0];

                select.innerHTML = "";

                /* Only allow overdue + first upcoming */

                let foundUpcoming = false;

                /* Sort by due date */

                merged.sort((a, b) =>
                    new Date(a.dueDate) - new Date(b.dueDate)
                );

                merged.forEach(v => {

                    if (v.status === "completed" || v.status === "scheduled") return;

                    if (v.status === "upcoming") {

                        if (foundUpcoming) return;

                        foundUpcoming = true;

                    }

                    const opt = document.createElement("option");

                    opt.value = JSON.stringify({

                        name: v.vaccineName,
                        dose: v.doseNumber

                    });

                    if (v.status === "overdue") {

                        opt.innerText =
                            `${v.vaccineName}-${v.doseNumber} (Overdue)`;

                    }

                    else {

                        opt.innerText =
                            `${v.vaccineName}-${v.doseNumber} (Upcoming)`;

                    }

                    select.appendChild(opt);

                });

                if (select.children.length === 0) {

                    select.innerHTML =
                        "<option disabled>All vaccines completed</option>";

                }

            });

        /* FETCH NEARBY CLINICS */

        async function fetchNearbyClinics(address) {

            const clinicSelect =
                document.querySelectorAll("select.form-control")[1];

            clinicSelect.innerHTML =
                "<option disabled selected>Loading nearby clinics...</option>";

            try {

                const res =
                    await fetch(`/nearby-clinics?address=${encodeURIComponent(address)}`);

                const clinics = await res.json();

                if (clinics.length === 0) {

                    clinicSelect.innerHTML =
                        "<option disabled>No clinics found nearby</option>";

                    return;

                }

                clinicSelect.innerHTML = "";

                clinics.forEach(clinic => {

                    const opt = document.createElement("option");

                    opt.value = JSON.stringify({

                        name: clinic.name,
                        address: clinic.address,
                        distance: clinic.distance

                    });

                    opt.innerText =
                        `${clinic.name} - ${clinic.distance}`;

                    clinicSelect.appendChild(opt);

                });

            } catch (err) {

                console.error(err);

                clinicSelect.innerHTML =
                    "<option disabled>Error loading clinics</option>";

            }

        }

        /* BOOK APPOINTMENT */

        async function bookAppointment() {

            const vaccineSelect =
                document.querySelectorAll("select.form-control")[0];

            if (
                vaccineSelect.selectedIndex < 0 ||
                vaccineSelect.children[0].disabled
            ) {

                return alert("Please select a valid vaccine");

            }

            const vaccineData =
                JSON.parse(vaccineSelect.value);

            const dateInput =
                document.querySelector("input[type='date']").value;

            const clinicSelect =
                document.querySelectorAll("select.form-control")[1];

            let clinicVal;

            try {

                clinicVal = JSON.parse(clinicSelect.value);

            } catch {

                return alert("Please select a clinic");

            }

            if (!dateInput) {

                return alert("Please select appointment date");

            }

            const res = await fetch("/vaccination/add", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({

                    childID: currentChildID,

                    vaccineName: vaccineData.name,

                    doseNumber: vaccineData.dose,

                    scheduledDate: dateInput,

                    hospital: clinicVal.name,

                    hospitalAddress: clinicVal.address,

                    distance: clinicVal.distance,

                    status: "scheduled"

                })

            });

            const data = await res.json();

            alert(data.message);

            window.location.href = "dashboard.html";

        }

    </script>
</body>
